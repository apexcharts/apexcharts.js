<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Simple HeatMap</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Seeded PRNG so the heatmap is identical on every load (stable snapshots).
      var __seed = 0x11a2c3d4
      function rand() {
        __seed |= 0
        __seed = (__seed + 0x6d2b79f5) | 0
        var t = Math.imul(__seed ^ (__seed >>> 15), 1 | __seed)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }

      function generateData(count, yrange) {
        var i = 0
        var series = []
        while (i < count) {
          var x = 'w' + (i + 1).toString()
          var y = Math.floor(rand() * (yrange.max - yrange.min + 1)) + yrange.min

          series.push({
            x: x,
            y: y,
          })
          i++
        }
        return series
      }
    </script>
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Dashboard',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Reports',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Search',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Profile',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Billing',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Settings',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Inbox',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Calendar',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
          {
            name: 'Files',
            data: generateData(18, {
              min: 0,
              max: 90,
            }),
          },
        ],
        chart: {
          height: 350,
          type: 'heatmap',
        },
        dataLabels: {
          enabled: false,
        },
        colors: ['#008FFB'],
        title: {
          text: 'Feature Usage by Week (single color)',
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
