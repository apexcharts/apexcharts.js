<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Rounded Stacked Columns with Negatives</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Cloud',
            data: [30, 42, 38, 55, 48, 60],
          },
          {
            name: 'Hardware',
            data: [20, -8, 15, 12, -5, 18],
          },
          {
            name: 'Services',
            data: [15, 22, -10, 18, 25, 20],
          },
          {
            name: 'Licensing',
            data: [25, 18, 22, 14, 30, 24],
          },
        ],
        chart: {
          type: 'bar',
          height: 350,
          stacked: true,
          toolbar: {
            show: true,
          },
        },
        stroke: {
          width: 1,
          colors: ['#fff'],
        },
        plotOptions: {
          bar: {
            horizontal: false,
            borderRadius: 10,
            borderRadiusApplication: 'end',
            borderRadiusWhenStacked: 'last',
            dataLabels: {
              total: {
                enabled: true,
                style: {
                  fontSize: '13px',
                  fontWeight: 900,
                },
              },
            },
          },
        },
        title: {
          text: 'Quarterly Profit & Loss by Segment',
          align: 'left',
        },
        xaxis: {
          categories: [
            'Q1 2024',
            'Q2 2024',
            'Q3 2024',
            'Q4 2024',
            'Q1 2025',
            'Q2 2025',
          ],
        },
        yaxis: {
          labels: {
            formatter: function (val) {
              return '$' + val + 'M'
            },
          },
        },
        legend: {
          position: 'right',
          offsetY: 40,
        },
        fill: {
          opacity: 1,
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
