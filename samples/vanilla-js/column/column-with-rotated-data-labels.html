<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Column with rotate negative Data Labels</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Net Margin',
            data: [
              8.2, 12.5, 6.1, -3.4, -9.8, -14.2, -6.5, 2.1, 9.4, 15.8, 11.2, -4.6,
            ],
          },
        ],
        chart: {
          type: 'bar',
          height: 350,
        },
        title: {
          text: 'Monthly Net Profit Margin',
          align: 'left',
        },
        plotOptions: {
          bar: {
            colors: {
              ranges: [
                {
                  from: -30,
                  to: -8,
                  color: '#F15B46',
                },
                {
                  from: -8,
                  to: 0,
                  color: '#FEB019',
                },
              ],
            },
            columnWidth: '70%',
            dataLabels: {
              orientation: 'vertical',
              position: 'top', // top, center, bottom
            },
          },
        },
        dataLabels: {
          enabled: true,
          offsetY: 2,
          formatter: function (val) {
            return val + '%'
          },
          style: {
            fontSize: '12px',
            colors: ['#000000'],
          },
        },
        yaxis: {
          title: {
            text: 'Net Margin',
          },
          labels: {
            formatter: function (y) {
              return y.toFixed(0) + '%'
            },
          },
        },
        xaxis: {
          type: 'category',
          categories: [
            'Jan',
            'Feb',
            'Mar',
            'Apr',
            'May',
            'Jun',
            'Jul',
            'Aug',
            'Sep',
            'Oct',
            'Nov',
            'Dec',
          ],
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
