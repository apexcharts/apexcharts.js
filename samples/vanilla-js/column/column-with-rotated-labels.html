<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Column with Rotated Labels</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Units sold',
            data: [44, 55, 41, 67, 22, 43, 21, 33, 45, 31, 87, 65, 35],
          },
        ],
        annotations: {
          points: [
            {
              x: 'Pomegranates',
              seriesIndex: 0,
              label: {
                borderColor: '#775DD0',
                offsetY: 0,
                style: {
                  color: '#fff',
                  background: '#775DD0',
                },
                text: 'Best seller',
              },
            },
          ],
        },
        chart: {
          height: 350,
          type: 'bar',
        },
        title: {
          text: 'Fruit Sales by Type',
          align: 'left',
        },
        plotOptions: {
          bar: {
            borderRadius: 10,
            columnWidth: '50%',
          },
        },
        dataLabels: {
          enabled: false,
        },
        stroke: {
          width: 0,
        },
        xaxis: {
          labels: {
            rotate: -45,
          },
          categories: [
            'Apples',
            'Oranges',
            'Strawberries',
            'Pineapples',
            'Mangoes',
            'Bananas',
            'Blackberries',
            'Pears',
            'Watermelons',
            'Cherries',
            'Pomegranates',
            'Tangerines',
            'Papayas',
          ],
          tickPlacement: 'on',
        },
        yaxis: {
          title: {
            text: 'Units sold (k)',
          },
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
