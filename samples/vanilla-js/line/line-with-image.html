<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Line with Image Fill</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Temperature',
            data: [-2, 0, 6, 12, 18, 24, 28, 27, 21, 14, 7, 1],
          },
        ],
        chart: {
          height: 350,
          type: 'line',
        },
        stroke: {
          width: 14,
          curve: 'smooth',
        },
        xaxis: {
          categories: [
            'Jan',
            'Feb',
            'Mar',
            'Apr',
            'May',
            'Jun',
            'Jul',
            'Aug',
            'Sep',
            'Oct',
            'Nov',
            'Dec',
          ],
        },
        title: {
          text: 'Average Daily Temperature',
          align: 'left',
          style: {
            fontSize: '16px',
          },
        },
        subtitle: {
          text: 'The line stroke is painted with an image fill',
          align: 'left',
        },
        fill: {
          type: 'image',
          image: {
            src: ['../../assets/images/2979121308_59539a3898_z.jpg'],
            width: 640,
            height: 424,
          },
        },
        markers: {
          size: 0,
          opacity: 0,
          colors: ['#fff'],
          strokeColor: '#2e93fa',
          strokeWidth: 2,
          hover: {
            size: 8,
          },
        },
        yaxis: {
          title: {
            text: 'Temperature (°C)',
          },
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
