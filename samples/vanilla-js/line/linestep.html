<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Linestep Chart</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Tariff per kWh',
            data: [12, 12, 15, 22, 22, 18, 15, 24, 24, 15, 12],
          },
        ],
        chart: {
          type: 'line',
          height: 350,
        },
        stroke: {
          curve: 'linestep',
        },
        dataLabels: {
          enabled: false,
        },
        title: {
          text: 'Electricity Tariff by Time of Day',
          align: 'left',
        },
        subtitle: {
          text: "curve: 'linestep' steps to each new value at the point itself",
          align: 'left',
        },
        xaxis: {
          categories: [
            '00:00',
            '02:00',
            '04:00',
            '06:00',
            '08:00',
            '10:00',
            '12:00',
            '14:00',
            '16:00',
            '18:00',
            '20:00',
          ],
        },
        yaxis: {
          labels: {
            formatter: function (val) {
              return val + '¢'
            },
          },
        },
        markers: {
          hover: {
            sizeOffset: 4,
          },
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
