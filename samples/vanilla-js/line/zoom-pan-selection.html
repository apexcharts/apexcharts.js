<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Zoom Pan Selection</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 700px;
        margin: 30px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Deterministic minute-by-minute throughput with a traffic burst around x=38,
      // so there is something worth zooming into.
      function mulberry32(seed) {
        return function () {
          seed |= 0
          seed = (seed + 0x6d2b79f5) | 0
          var t = Math.imul(seed ^ (seed >>> 15), 1 | seed)
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296
        }
      }

      var rand = mulberry32(7)
      var trafficData = []
      var level = 40
      for (var i = 1; i <= 60; i++) {
        level += (rand() - 0.5) * 12
        if (level < 15) level = 15
        var y = level
        if (i >= 32 && i <= 44) {
          y += 70 * Math.exp(-Math.pow(i - 38, 2) / 8)
        }
        trafficData.push([i, Math.round(y)])
      }
    </script>
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Throughput',
            data: trafficData,
          },
        ],
        chart: {
          type: 'line',
          height: 400,
          zoom: {
            enabled: true,
            type: 'x',
            autoScaleYaxis: false,
          },
          toolbar: {
            autoSelected: 'zoom',
          },
          animations: { enabled: false },
        },
        title: {
          text: 'Network Throughput (Mbps)',
          align: 'left',
        },
        subtitle: {
          text: 'Drag to zoom into the traffic burst around minute 38',
          align: 'left',
        },
        dataLabels: { enabled: false },
        markers: { size: 0 },
        xaxis: {
          type: 'numeric',
          title: {
            text: 'Minute',
          },
        },
        yaxis: { min: 0 },
        stroke: { curve: 'monotoneCubic' },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
