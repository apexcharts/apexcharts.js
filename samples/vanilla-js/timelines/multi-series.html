<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Multi-series Timeline</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Frontend',
            data: [
              {
                x: 'Design',
                y: [
                  new Date('2024-03-05').getTime(),
                  new Date('2024-03-08').getTime(),
                ],
              },
              {
                x: 'Code',
                y: [
                  new Date('2024-03-08').getTime(),
                  new Date('2024-03-11').getTime(),
                ],
              },
              {
                x: 'Test',
                y: [
                  new Date('2024-03-11').getTime(),
                  new Date('2024-03-16').getTime(),
                ],
              },
            ],
          },
          {
            name: 'Backend',
            data: [
              {
                x: 'Design',
                y: [
                  new Date('2024-03-02').getTime(),
                  new Date('2024-03-05').getTime(),
                ],
              },
              {
                x: 'Code',
                y: [
                  new Date('2024-03-06').getTime(),
                  new Date('2024-03-09').getTime(),
                ],
              },
              {
                x: 'Test',
                y: [
                  new Date('2024-03-10').getTime(),
                  new Date('2024-03-19').getTime(),
                ],
              },
            ],
          },
        ],
        chart: {
          height: 350,
          type: 'rangeBar',
        },
        title: {
          text: 'Frontend vs Backend Schedule',
        },
        plotOptions: {
          bar: {
            borderRadius: 10,
            horizontal: true,
          },
        },
        dataLabels: {
          enabled: true,
          formatter: function (val) {
            var diff = Math.round((val[1] - val[0]) / (1000 * 60 * 60 * 24))
            return diff + (diff > 1 ? ' days' : ' day')
          },
        },
        fill: {
          type: 'gradient',
          gradient: {
            shade: 'light',
            type: 'vertical',
            shadeIntensity: 0.25,
            gradientToColors: undefined,
            inverseColors: true,
            opacityFrom: 1,
            opacityTo: 1,
            stops: [50, 0, 100, 100],
          },
        },
        xaxis: {
          type: 'datetime',
        },
        legend: {
          position: 'top',
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
