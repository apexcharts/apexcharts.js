<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Multiple Y Axis Aligned at Zero</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            name: 'Profit',
            type: 'column',
            data: [5, 12, -8, 14, -3, 9, -2, 6],
          },
          {
            name: 'Units Sold',
            type: 'column',
            data: [1.2, 2.1, 1.8, 2.7, 2.0, 2.4, 1.9, 2.6],
          },
          {
            name: 'Index',
            type: 'line',
            data: [25, 27, 26, 29, 28, 29, 30, 30],
          },
        ],
        chart: {
          height: 350,
          type: 'line',
          stacked: false,
        },
        stroke: {
          width: [0, 0, 4],
        },
        title: {
          text: 'Multiple Y-Axes With Aligned Zero',
          align: 'left',
        },
        xaxis: {
          categories: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6', 'Q7', 'Q8'],
        },
        yaxis: [
          {
            seriesName: 'Profit',
            alignZero: true,
            axisTicks: { show: true },
            axisBorder: { show: true, color: '#008FFB' },
            labels: { style: { colors: '#008FFB' } },
            title: { text: 'Profit (mixed +/-)', style: { color: '#008FFB' } },
          },
          {
            seriesName: 'Units Sold',
            alignZero: true,
            opposite: true,
            axisTicks: { show: true },
            axisBorder: { show: true, color: '#00E396' },
            labels: { style: { colors: '#00E396' } },
            title: { text: 'Units (positive only)', style: { color: '#00E396' } },
          },
          {
            seriesName: 'Index',
            alignZero: true,
            opposite: true,
            axisTicks: { show: true },
            axisBorder: { show: true, color: '#FEB019' },
            labels: { style: { colors: '#FEB019' } },
            title: { text: 'Index', style: { color: '#FEB019' } },
          },
        ],
        tooltip: { shared: true, intersect: false },
        legend: { horizontalAlign: 'left' },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
