<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Gauge with Tick Marks</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      
        #chart {
      padding: 0;
      max-width: 420px;
      margin: 35px auto;
    }
      
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      
        var options = {
          series: [64],
          chart: {
          height: 360,
          type: 'gauge',
        },
        plotOptions: {
          radialBar: {
            startAngle: -135,
            endAngle: 135,
            ticks: {
              show: true,
              major: {
                count: 11,
                length: 12,
                width: 2,
                color: '#475569',
                placement: 'outside',
              },
              minor: {
                count: 3,
                length: 6,
                width: 1,
                color: '#94A3B8',
                placement: 'outside',
              },
              labels: {
                show: true,
                offset: 8,
                fontSize: '11px',
                color: '#475569',
                formatter: function (v) {
                  return Math.round(v)
                },
              },
            },
            hollow: {
              margin: 30,
              size: '50%',
            },
            track: {
              strokeWidth: '60%',
              background: '#E2E8F0',
            },
            dataLabels: {
              name: { show: false },
              value: {
                offsetY: 8,
                fontSize: '28px',
                fontWeight: 600,
                formatter: function (val) {
                  return val + '%'
                },
              },
            },
          },
        },
        labels: ['Progress'],
        };

        var chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
      
      
    </script>

    
  </body>
</html>
