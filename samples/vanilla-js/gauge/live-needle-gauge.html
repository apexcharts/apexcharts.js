<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Live Needle Gauge</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      
        #chart {
      padding: 0;
      max-width: 560px;
      margin: 35px auto;
    }
      
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      
        var options = {
          series: [86],
          chart: {
          height: 360,
          type: 'gauge',
          animations: {
            enabled: true,
            dynamicAnimation: { enabled: true, speed: 800 },
          },
        },
        colors: ['#00A86F'],
        plotOptions: {
          radialBar: {
            shape: 'needle',
            startAngle: -90,
            endAngle: 90,
            min: 0,
            max: 100,
            ticks: {
              show: true,
              major: {
                count: 11,
                length: 0,
                width: 0,
                color: 'transparent',
                placement: 'outside',
              },
              minor: {
                count: 0,
                length: 0,
                width: 0,
                color: 'transparent',
              },
              labels: {
                show: true,
                offset: 25,
                fontSize: '12px',
                fontWeight: 500,
                color: '#0F172A',
                formatter: function (v) {
                  return v + '%'
                },
              },
            },
            needle: {
              color: '#1E293B',
              length: '85%',
              baseWidth: 10,
              tipWidth: 1,
              showValueArc: true,
            },
            track: {
              show: true,
              background: '#ddd',
              strokeWidth: '100%',
              margin: 0,
            },
            hollow: {
              margin: 0,
              size: '70%',
              background: 'transparent',
            },
            dataLabels: {
              name: { show: false },
              value: {
                offsetY: 20,
                fontSize: '16px',
                fontWeight: 700,
                color: '#0F172A',
                formatter: function (val) {
                  return val + '%'
                },
              },
            },
          },
        },
        stroke: {
          lineCap: 'butt',
        },
        labels: ['Progress'],
        };

        var chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
      
      
        window.setInterval(function () {
        var next = Math.floor(Math.random() * 101)
        chart.updateSeries([next])
      }, 2000)
      
    </script>

    
  </body>
</html>
