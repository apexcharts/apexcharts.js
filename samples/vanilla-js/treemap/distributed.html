<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Distributed Treemap</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="../../../dist/apexcharts.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
     <div id="chart"></div>

    <script>
      var options = {
        series: [
          {
            data: [
              {
                x: 'node_modules',
                y: 428,
              },
              {
                x: 'assets',
                y: 213,
              },
              {
                x: '.git',
                y: 154,
              },
              {
                x: 'build',
                y: 96,
              },
              {
                x: 'vendor',
                y: 88,
              },
              {
                x: 'public',
                y: 61,
              },
              {
                x: 'src',
                y: 47,
              },
              {
                x: 'cache',
                y: 39,
              },
              {
                x: 'docs',
                y: 24,
              },
              {
                x: 'tests',
                y: 18,
              },
              {
                x: 'logs',
                y: 12,
              },
              {
                x: 'config',
                y: 6,
              },
            ],
          },
        ],
        legend: {
          show: false,
        },
        chart: {
          height: 350,
          type: 'treemap',
        },
        title: {
          text: 'Disk Usage by Folder (GB)',
          align: 'center',
        },
        colors: [
          '#3B93A5',
          '#F7B844',
          '#ADD8C7',
          '#EC3C65',
          '#CDD7B6',
          '#C1F666',
          '#D43F97',
          '#1E5D8C',
          '#421243',
          '#7F94B0',
          '#EF6537',
          '#C0ADDB',
        ],
        plotOptions: {
          treemap: {
            distributed: true,
            enableShades: false,
          },
        },
      }

      var chart = new ApexCharts(document.querySelector('#chart'), options)
      chart.render()
    </script>

    
  </body>
</html>
