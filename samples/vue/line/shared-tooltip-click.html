<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Line — Shared Tooltip Click Reports Correct Series</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="line" height="380" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;line&quot; height=&quot;380&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            { name: 'Desktops', data: [10, 16, 12, 18, 13, 20, 15, 22, 17] },
            { name: 'Tablets', data: [38, 45, 40, 47, 42, 49, 44, 51, 46] },
            { name: 'Phones', data: [66, 73, 68, 75, 70, 77, 72, 79, 74] },
            { name: 'Watches', data: [94, 101, 96, 103, 98, 105, 100, 107, 102] },
            {
              name: 'Projectors',
              data: [122, 129, 124, 131, 126, 133, 128, 135, 130],
            },
          ],
          chartOptions: {
            chart: {
              height: 380,
              width: '100%',
              type: 'line',
            },
            tooltip: {
              shared: true,
            },
            markers: {
              size: 5,
            },
            stroke: {
              curve: 'straight',
            },
            title: {
              text: 'Shared tooltip — click reports the clicked series',
              align: 'left',
            },
            xaxis: {
              categories: [
                'Jan',
                'Feb',
                'Mar',
                'Apr',
                'May',
                'Jun',
                'Jul',
                'Aug',
                'Sep',
              ],
            },
          },
        },
      })
    </script>
    
  </body>
</html>
