<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Bar with Custom DataLabels</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bar" height="380" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bar&quot; height=&quot;380&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              data: [160, 210, 240, 310, 380, 450, 560, 690, 820, 1040],
            },
          ],
          chartOptions: {
            chart: {
              type: 'bar',
              height: 380,
            },
            plotOptions: {
              bar: {
                barHeight: '100%',
                distributed: true,
                horizontal: true,
                dataLabels: {
                  position: 'bottom',
                },
              },
            },
            theme: {
              monochrome: {
                enabled: true,
                color: '#3974FF',
                shadeTo: 'dark',
                shadeIntensity: 0.5,
              },
            },
            dataLabels: {
              enabled: true,
              textAnchor: 'start',
              style: {
                colors: ['#fff'],
                fontWeight: 600,
              },
              formatter: function (val, opt) {
                return opt.w.globals.labels[opt.dataPointIndex] + ':  ' + val
              },
              offsetX: 8,
            },
            legend: {
              show: false,
            },
            stroke: {
              width: 1,
              colors: ['#fff'],
            },
            xaxis: {
              categories: [
                'Billing',
                'Onboarding',
                'Account',
                'Feature Request',
                'Integrations',
                'Performance',
                'Mobile App',
                'Security',
                'Login',
                'Bug Report',
              ],
            },
            yaxis: {
              labels: {
                show: false,
              },
            },
            title: {
              text: 'Support Tickets by Category',
              align: 'center',
              floating: true,
            },
            subtitle: {
              text: 'Category names shown as labels inside the bars',
              align: 'center',
            },
            tooltip: {
              theme: 'dark',
              x: {
                show: false,
              },
              y: {
                title: {
                  formatter: function () {
                    return ''
                  },
                },
              },
            },
          },
        },
      })
    </script>
    
  </body>
</html>
