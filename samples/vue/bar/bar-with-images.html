<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Bar Chart with Images</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }

      #apexcharts-canvas {
        margin: 0 auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bar" height="410" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bar&quot; height=&quot;410&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Units sold',
              data: [820, 940, 610, 480, 560, 720, 390, 680, 900, 430, 350, 640],
            },
          ],
          chartOptions: {
            chart: {
              type: 'bar',
              height: 410,
              animations: {
                enabled: false,
              },
            },
            plotOptions: {
              bar: {
                horizontal: true,
                barHeight: '100%',
              },
            },
            dataLabels: {
              enabled: false,
            },
            stroke: {
              width: 1,
              colors: ['#000'],
            },
            yaxis: {
              axisBorder: {
                show: false,
              },
              axisTicks: {
                show: false,
              },
              title: {
                text: 'Units sold',
              },
            },
            xaxis: {
              categories: [
                'Vanilla',
                'Chocolate',
                'Strawberry',
                'Mint',
                'Mango',
                'Coffee',
                'Pistachio',
                'Caramel',
                'Cookies',
                'Coconut',
                'Lemon',
                'Berry',
              ],
            },
            grid: {
              position: 'back',
            },
            title: {
              text: 'Ice Cream Sales by Flavour',
              align: 'left',
            },
            subtitle: {
              text: 'Bars filled by a single clipped image',
              align: 'left',
            },
            fill: {
              type: 'image',
              opacity: 0.9,
              image: {
                src: '../../assets/images/stripes.jpg',
                width: 640,
                height: 427,
              },
            },
          },
        },
      })
    </script>
    
  </body>
</html>
