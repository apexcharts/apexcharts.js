<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Bar Chart with Pattern Fill</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bar" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bar&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Coal',
              data: [44, 55, 41, 37, 22, 43, 21],
            },
            {
              name: 'Natural Gas',
              data: [53, 32, 33, 52, 13, 43, 32],
            },
            {
              name: 'Solar',
              data: [12, 17, 11, 9, 15, 11, 20],
            },
            {
              name: 'Wind',
              data: [9, 7, 5, 8, 6, 9, 4],
            },
          ],
          chartOptions: {
            chart: {
              type: 'bar',
              height: 350,
              stacked: true,
            },
            plotOptions: {
              bar: {
                horizontal: true,
                barHeight: '60%',
              },
            },
            dataLabels: {
              enabled: false,
            },
            stroke: {
              width: 2,
            },
            title: {
              text: 'Electricity Generation by Source',
            },
            xaxis: {
              categories: [2019, 2020, 2021, 2022, 2023, 2024, 2025],
            },
            yaxis: {
              title: {
                text: undefined,
              },
            },
            tooltip: {
              shared: false,
              y: {
                formatter: function (val) {
                  return val + ' TWh'
                },
              },
            },
            fill: {
              type: 'pattern',
              opacity: 1,
              pattern: {
                style: [
                  'circles',
                  'slantedLines',
                  'verticalLines',
                  'horizontalLines',
                ], // string or array of strings
              },
            },
            states: {
              hover: {
                filter: 'none',
              },
            },
            legend: {
              position: 'right',
              offsetY: 40,
            },
          },
        },
      })
    </script>
    
  </body>
</html>
