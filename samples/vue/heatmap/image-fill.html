<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HeatMap with image fill</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Seeded PRNG so the heatmap is identical on every load (stable snapshots).
      var __seed = 0x44d5f607
      function rand() {
        __seed |= 0
        __seed = (__seed + 0x6d2b79f5) | 0
        var t = Math.imul(__seed ^ (__seed >>> 15), 1 | __seed)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }

      function generateData(count, yrange) {
        var i = 0
        var series = []
        while (i < count) {
          var x = 'Post ' + (i + 1).toString()
          var y = Math.floor(rand() * (yrange.max - yrange.min + 1)) + yrange.min

          series.push({
            x: x,
            y: y,
          })
          i++
        }
        return series
      }
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="heatmap" height="360" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;heatmap&quot; height=&quot;360&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: '@oliver',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: '@harry',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: '@thomas',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: '@callum',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: '@ethan',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: '@richard',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: '@david',
              data: generateData(15, {
                min: 0,
                max: 90,
              }),
            },
          ],
          chartOptions: {
            chart: {
              height: 360,
              type: 'heatmap',
            },
            dataLabels: {
              enabled: false,
            },
            colors: ['#008FFB'],
            title: {
              text: 'Instagram Engagement by Post',
            },
            fill: {
              type: 'image',
              image: {
                src: '../../assets/images/ico-instagram.png',
              },
            },
          },
        },
      })
    </script>
    
  </body>
</html>
