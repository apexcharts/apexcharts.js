<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Simple HeatMap</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Seeded PRNG so the heatmap is identical on every load (stable snapshots).
      var __seed = 0x66f70829
      function rand() {
        __seed |= 0
        __seed = (__seed + 0x6d2b79f5) | 0
        var t = Math.imul(__seed ^ (__seed >>> 15), 1 | __seed)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }

      function generateData(count, yrange) {
        var i = 0
        var series = []
        while (i < count) {
          var x = (i + 1).toString()
          var y = Math.floor(rand() * (yrange.max - yrange.min + 1)) + yrange.min

          series.push({
            x: x,
            y: y,
          })
          i++
        }
        return series
      }
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="heatmap" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;heatmap&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Auth',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'API',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'UI',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'Database',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'Cache',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'Search',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'Payments',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'Email',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
            {
              name: 'Jobs',
              data: generateData(20, {
                min: 0,
                max: 90,
              }),
            },
          ],
          chartOptions: {
            chart: {
              height: 350,
              type: 'heatmap',
            },
            stroke: {
              width: 0,
            },
            plotOptions: {
              heatmap: {
                radius: 30,
                enableShades: false,
                colorScale: {
                  ranges: [
                    {
                      from: 0,
                      to: 50,
                      color: '#008FFB',
                    },
                    {
                      from: 51,
                      to: 100,
                      color: '#00E396',
                    },
                  ],
                },
              },
            },
            dataLabels: {
              enabled: true,
              style: {
                colors: ['#fff'],
              },
            },
            xaxis: {
              type: 'category',
            },
            title: {
              text: 'Test Coverage % by Build (rounded cells)',
            },
          },
        },
      })
    </script>
    
  </body>
</html>
