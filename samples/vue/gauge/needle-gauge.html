<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Needle Gauge</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      
        #chart {
      padding: 0;
      max-width: 420px;
      margin: 35px auto;
    }
      
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="gauge" height="360" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;gauge&quot; height=&quot;360&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          
          series: [68],
          chartOptions: {
            chart: {
              height: 360,
              type: 'gauge',
            },
            plotOptions: {
              radialBar: {
                shape: 'needle',
                startAngle: -135,
                endAngle: 135,
                min: 0,
                max: 100,
                bands: [
                  { from: 0, to: 30, color: '#FF4560' },
                  { from: 30, to: 70, color: '#FEB019' },
                  { from: 70, to: 100, color: '#00E396' },
                ],
                bandsStyle: {
                  strokeWidth: '50%',
                  gap: 1,
                },
                ticks: {
                  show: true,
                  major: {
                    count: 11,
                    length: 8,
                    width: 2,
                    color: '#334155',
                    placement: 'outside',
                  },
                  minor: {
                    count: 1,
                    length: 4,
                    width: 1,
                    color: '#94A3B8',
                    placement: 'outside',
                  },
                  labels: {
                    show: true,
                    offset: 6,
                    fontSize: '11px',
                    color: '#334155',
                  },
                },
                needle: {
                  color: '#0F172A',
                  baseRadius: 10,
                  length: '60%',
                  baseWidth: 6,
                  tipWidth: 1,
                },
                pivot: {
                  show: true,
                  color: '#0F172A',
                  strokeColor: '#fff',
                  strokeWidth: 2,
                },
                hollow: {
                  margin: 0,
                  size: '70%',
                },
                dataLabels: {
                  name: { show: false },
                  value: {
                    offsetY: 32,
                    fontSize: '28px',
                    fontWeight: 700,
                    formatter: function (val) {
                      return val
                    },
                  },
                },
              },
            },
            labels: ['Speed'],
          },
          
          
        },
        
      })
    </script>
    
  </body>
</html>
