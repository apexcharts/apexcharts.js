<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Pie with Image</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        padding: 0;
        max-width: 480px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="pie" width="480" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;pie&quot; width=&quot;480&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [128, 92, 156, 64],
          chartOptions: {
            chart: {
              width: 480,
              type: 'pie',
            },
            labels: ['Cityscape', 'Waterfront', 'Street Art', 'Patterns'],
            title: {
              text: 'Photo Library by Scene',
              align: 'center',
            },
            colors: ['#93C3EE', '#E5C6A0', '#669DB5', '#94A74A'],
            fill: {
              type: 'image',
              opacity: 0.9,
              image: {
                src: [
                  '../../assets/images/4274635880_809a4b9d0d_z.jpg',
                  '../../assets/images/2979121308_59539a3898_z.jpg',
                  '../../assets/images/4679113782_ca13e2e6c0_z.jpg',
                  '../../assets/images/stripes.jpg',
                ],
                width: 500,
                height: 500,
              },
            },
            stroke: {
              width: 4,
            },
            legend: {
              show: false,
            },
            dataLabels: {
              enabled: true,
              style: {
                colors: ['#111'],
              },
              background: {
                enabled: true,
                foreColor: '#fff',
                borderWidth: 0,
              },
            },
            plotOptions: {
              pie: {
                dataLabels: {
                  external: {
                    show: true,
                  },
                },
              },
            },
            responsive: [
              {
                breakpoint: 480,
                options: {
                  chart: {
                    width: 320,
                  },
                },
              },
            ],
          },
        },
      })
    </script>
    
  </body>
</html>
