<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Trapezoid Funnel</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      
        #chart {
      max-width: 650px;
      margin: 35px auto;
    }
      
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="funnel" height="400" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;funnel&quot; height=&quot;400&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          
          series: [
            {
              name: "Conversion",
              data: [10000, 6400, 3800, 2200, 1100, 420],
            },
          ],
          chartOptions: {
            chart: {
              type: 'funnel',
              height: 400,
              dropShadow: {
                enabled: true,
              },
            },
            plotOptions: {
              funnel: {
                shape: 'trapezoid',
                lastShape: 'flat',
              },
              bar: {
                distributed: true,
              },
            },
            colors: [
              '#3B82F6',
              '#6366F1',
              '#8B5CF6',
              '#A855F7',
              '#D946EF',
              '#EC4899',
            ],
            dataLabels: {
              enabled: true,
              formatter: function (val, opt) {
                return opt.w.globals.labels[opt.dataPointIndex] + ': ' + val
              },
              style: {
                colors: ['#fff'],
                fontSize: '14px',
                fontWeight: 600,
              },
            },
            title: {
              text: 'Sales Funnel — Trapezoid',
              align: 'middle',
            },
            xaxis: {
              categories: [
                'Visits',
                'Signups',
                'Activated',
                'Engaged',
                'Trial',
                'Paid',
              ],
            },
            legend: {
              show: false,
            },
          },
          
          
        },
        
      })
    </script>
    
  </body>
</html>
