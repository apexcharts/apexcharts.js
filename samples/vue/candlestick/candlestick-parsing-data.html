<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Candlestick - Parsing Data</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Seeded PRNG so the generated candles are identical on every load (stable
      // snapshots); the point of this demo is the `parsing` option, not the data.
      var __seed = 0x2f6e2b1
      function rand() {
        __seed |= 0
        __seed = (__seed + 0x6d2b79f5) | 0
        var t = Math.imul(__seed ^ (__seed >>> 15), 1 | __seed)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }

      function generateDateRange(days, startDate = new Date('2025-06-01')) {
        const dates = []
        const currentDate = new Date(startDate)

        currentDate.setDate(currentDate.getDate() - days + 1)

        for (let i = 0; i < days; i++) {
          dates.push(new Date(currentDate).toISOString())
          currentDate.setDate(currentDate.getDate() + 1)
        }

        return dates
      }

      function getRandomRecentDate() {
        // Fixed end date so the 30-day window is deterministic.
        return new Date('2025-06-30')
      }

      function generatePriceChange(
        currentPrice,
        minPrice,
        maxPrice,
        volatility = 0.03,
      ) {
        const changePercent = (rand() - 0.5) * 2 * volatility
        let newPrice = currentPrice * (1 + changePercent)

        newPrice = Math.max(minPrice, Math.min(maxPrice, newPrice))

        return Math.round(newPrice * 100) / 100
      }

      function generateHighLow(open, close, minPrice, maxPrice) {
        const min = Math.min(open, close)
        const max = Math.max(open, close)

        const volatilityRange = Math.max(1, (max - min) * 2)

        const low = Math.max(minPrice, min - rand() * volatilityRange * 0.5)

        const high = Math.min(maxPrice, max + rand() * volatilityRange * 0.5)

        return {
          high: Math.round(high * 100) / 100,
          low: Math.round(low * 100) / 100,
        }
      }

      function generateSingleCandlestick(
        date,
        previousClose,
        minPrice = 120,
        maxPrice = 180,
      ) {
        const gapPercent = (rand() - 0.5) * 0.02
        let open = previousClose * (1 + gapPercent)
        open = Math.max(minPrice, Math.min(maxPrice, open))
        open = Math.round(open * 100) / 100

        const close = generatePriceChange(open, minPrice, maxPrice, 0.04)
        const { high, low } = generateHighLow(open, close, minPrice, maxPrice)

        return {
          date: date,
          open: open,
          high: high,
          low: low,
          close: close,
        }
      }

      function generateCandlestickData(days, options = {}) {
        const {
          startingPrice = 150,
          minPrice = 120,
          maxPrice = 180,
          startDate = getRandomRecentDate(),
        } = options

        if (!Number.isInteger(days) || days <= 0) {
          throw new Error('Days must be a positive integer')
        }

        if (startingPrice < minPrice || startingPrice > maxPrice) {
          throw new Error('Starting price must be within min and max price range')
        }

        const dates = generateDateRange(days, startDate)
        const candlesticks = []
        let previousClose = startingPrice

        for (const date of dates) {
          const candlestick = generateSingleCandlestick(
            date,
            previousClose,
            minPrice,
            maxPrice,
          )
          candlesticks.push(candlestick)
          previousClose = candlestick.close
        }

        return candlesticks
      }

      const stockData = generateCandlestickData(30)
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="candlestick" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;candlestick&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              data: stockData,
              parsing: {
                x: 'date',
                y: ['open', 'high', 'low', 'close'],
              },
            },
          ],
          chartOptions: {
            chart: {
              type: 'candlestick',
              height: 350,
            },
            title: {
              text: 'Daily Price (parsed from object fields)',
              align: 'left',
            },
            xaxis: {
              type: 'datetime',
            },
          },
        },
      })
    </script>
    
  </body>
</html>
