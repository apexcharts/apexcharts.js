<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Multiple series types stacked</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
      .apexcharts-tooltip-title {
        display: none;
      }
      #chart .apexcharts-tooltip {
        display: flex;
        border: 0;
        box-shadow: none;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="line" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;line&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'North · Electronics',
              type: 'bar',
              group: 'North',
              data: [21.1, 23, 33.1, 34, 44.1, 44.9, 56.5, 58.5],
            },
            {
              name: 'North · Apparel',
              type: 'bar',
              group: 'North',
              data: [10, 19, 27, 26, 34, 35, 40, 38],
            },
            {
              name: 'North · Home',
              type: 'bar',
              group: 'North',
              data: [21.1, 23, 33.1, 34, 44.1, 44.9, 56.5, 58.5],
            },
            {
              name: 'South · Electronics',
              type: 'bar',
              group: 'South',
              data: [10, 19, 27, 26, 34, 35, 40, 38],
            },
            {
              name: 'South · Apparel',
              type: 'bar',
              group: 'South',
              data: [21.1, 23, 33.1, 34, 44.1, 44.9, 56.5, 58.5],
            },
            {
              name: 'South · Home',
              type: 'bar',
              group: 'South',
              data: [10, 19, 27, 26, 34, 35, 40, 38],
            },
            {
              name: 'Online · Direct',
              type: 'bar',
              group: 'Online',
              data: [51.6, 47.8, 33.8, 26.5, 28.5, 35.5, 30, 20.4],
            },
            {
              name: 'Online · Marketplace',
              type: 'bar',
              group: 'Online',
              data: [10, 19, 27, 26, 34, 35, 40, 38],
            },
            {
              name: 'Forecast',
              type: 'area',
              group: 'Planning',
              data: [51.6, 47.8, 33.8, 26.5, 28.5, 35.5, 30, 20.4],
            },
            {
              name: 'Budget',
              type: 'area',
              group: 'Planning',
              data: [10, 19, 27, 26, 34, 35, 40, 38],
            },
            {
              name: 'Growth Index',
              type: 'line',
              group: 'Trend',
              data: [1.4, 2, 2.5, 3.5, 3.5, 2.8, 3.8, 3.6],
            },
          ],
          chartOptions: {
            chart: {
              height: 350,
              type: 'line',
              stacked: true,
              stackOnlyBar: false,
            },
            plotOptions: {
              bar: {
                columnWidth: '70%',
              },
            },
            dataLabels: {
              enabled: true,
              enabledOnSeries: [10],
            },
            title: {
              text: 'Regional & Online Sales Mix',
            },
            xaxis: {
              categories: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024],
            },
            yaxis: [
              {
                seriesName: [
                  'North · Electronics',
                  'North · Apparel',
                  'North · Home',
                  'South · Electronics',
                  'South · Apparel',
                  'South · Home',
                ],
                axisTicks: {
                  show: true,
                  color: '#008FFB',
                },
                axisBorder: {
                  show: true,
                  color: '#008FFB',
                },
                title: {
                  text: 'Regional Sales ($k)',
                  style: {
                    color: '#008FFB',
                  },
                },
                labels: {
                  style: {
                    colors: ['#008FFB'],
                  },
                },
              },
              {
                opposite: true,
                seriesName: ['Online · Direct', 'Online · Marketplace'],
                axisTicks: {
                  show: true,
                  color: '#78909C',
                },
                axisBorder: {
                  show: true,
                  color: '#78909C',
                },
                title: {
                  text: 'Online Sales ($k)',
                  style: {
                    color: '#78909C',
                  },
                },
              },
              {
                seriesName: ['Forecast', 'Budget'],
                labels: {
                  style: {
                    colors: ['#88AA88'],
                  },
                },
                axisTicks: {
                  show: true,
                  color: '#88AA88',
                },
                axisBorder: {
                  show: true,
                  color: '#88AA88',
                },
                title: {
                  text: 'Planning ($k)',
                  style: {
                    color: '#88AA88',
                  },
                },
              },
              {
                opposite: true,
                seriesName: 'Growth Index',
                labels: {
                  style: {
                    colors: ['#78909C'],
                  },
                },
                axisTicks: {
                  show: true,
                  color: '#78909C',
                },
                axisBorder: {
                  show: true,
                  color: '#78909C',
                },
                title: {
                  text: 'Growth Index',
                  style: {
                    color: '#78909C',
                  },
                },
              },
            ],
            fill: {
              type: 'gradient',
              gradient: {
                shade: 'light',
              },
            },
            stroke: {
              width: [4, 4, 4, 4, 4, 4, 4, 4, 1, 1, 3],
              colors: [
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                'rgba(0,0,0,0)',
                '#fff',
                '#fff',
                '#222222',
              ],
              curve: [
                '',
                '',
                '',
                '',
                '',
                '',
                '',
                '',
                'stepline',
                'stepline',
                'straight',
              ],
            },
            colors: [
              '#00D8B6',
              '#008FFB',
              '#FEB019',
              '#FF4560',
              '#775DD0',
              '#95C11F',
              '#DDDDDD',
              '#888888',
              '#88AA88',
              '#DDEEDD',
              '#AAAAAA',
            ],
            tooltip: {
              shared: true,
            },
          },
        },
      })
    </script>
    
  </body>
</html>
