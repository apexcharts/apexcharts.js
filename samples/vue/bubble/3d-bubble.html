<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>3d Bubble Chart</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Seeded PRNG so the bubbles are identical on every load (stable snapshots).
      var __seed = 0x3d0b7e21
      function rand() {
        __seed |= 0
        __seed = (__seed + 0x6d2b79f5) | 0
        var t = Math.imul(__seed ^ (__seed >>> 15), 1 | __seed)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }

      // Each point is [date, conversionRate %, impressions]. The third value drives
      // the bubble size, so a bigger bubble = more impressions that day.
      function generateData(baseval, count, yrange, zrange) {
        var series = []
        for (var i = 0; i < count; i++) {
          var y = Math.floor(rand() * (yrange.max - yrange.min + 1)) + yrange.min
          var z = Math.floor(rand() * (zrange.max - zrange.min + 1)) + zrange.min
          series.push([baseval, y, z])
          baseval += 86400000
        }
        return series
      }
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bubble" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bubble&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Search',
              data: generateData(
                new Date('01 Jun 2024 GMT').getTime(),
                20,
                { min: 35, max: 60 },
                { min: 40, max: 75 },
              ),
            },
            {
              name: 'Social',
              data: generateData(
                new Date('01 Jun 2024 GMT').getTime(),
                20,
                { min: 20, max: 45 },
                { min: 30, max: 70 },
              ),
            },
            {
              name: 'Email',
              data: generateData(
                new Date('01 Jun 2024 GMT').getTime(),
                20,
                { min: 10, max: 30 },
                { min: 15, max: 45 },
              ),
            },
            {
              name: 'Display',
              data: generateData(
                new Date('01 Jun 2024 GMT').getTime(),
                20,
                { min: 5, max: 25 },
                { min: 20, max: 60 },
              ),
            },
          ],
          chartOptions: {
            chart: {
              height: 350,
              type: 'bubble',
            },
            dataLabels: {
              enabled: false,
            },
            fill: {
              type: 'gradient',
            },
            title: {
              text: 'Channel Performance Over Time',
            },
            subtitle: {
              text: 'Bubble size = daily impressions',
            },
            xaxis: {
              tickAmount: 12,
              type: 'datetime',
              labels: {
                rotate: 0,
              },
            },
            yaxis: {
              max: 70,
              title: {
                text: 'Conversion Rate (%)',
              },
            },
            theme: {
              palette: 'palette2',
            },
          },
        },
      })
    </script>
    
  </body>
</html>
