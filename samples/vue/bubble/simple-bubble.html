<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Simple Bubble</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Seeded PRNG so the bubbles are identical on every load (stable snapshots).
      var __seed = 0x7ab19c3d
      function rand() {
        __seed |= 0
        __seed = (__seed + 0x6d2b79f5) | 0
        var t = Math.imul(__seed ^ (__seed >>> 15), 1 | __seed)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }

      // Each point is [revenue $M, growth %, headcount]. The third value is the
      // bubble size, so a bigger bubble = a bigger workforce.
      function generateData(count, xrange, yrange, zrange) {
        var series = []
        for (var i = 0; i < count; i++) {
          var x = Math.floor(rand() * (xrange.max - xrange.min + 1)) + xrange.min
          var y = Math.floor(rand() * (yrange.max - yrange.min + 1)) + yrange.min
          var z = Math.floor(rand() * (zrange.max - zrange.min + 1)) + zrange.min
          series.push([x, y, z])
        }
        return series
      }
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bubble" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bubble&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'SaaS',
              data: generateData(
                12,
                { min: 20, max: 200 },
                { min: 25, max: 65 },
                { min: 20, max: 60 },
              ),
            },
            {
              name: 'Retail',
              data: generateData(
                12,
                { min: 150, max: 480 },
                { min: 5, max: 30 },
                { min: 40, max: 75 },
              ),
            },
            {
              name: 'Fintech',
              data: generateData(
                12,
                { min: 60, max: 320 },
                { min: 15, max: 50 },
                { min: 15, max: 55 },
              ),
            },
            {
              name: 'Hardware',
              data: generateData(
                12,
                { min: 100, max: 400 },
                { min: 2, max: 20 },
                { min: 30, max: 70 },
              ),
            },
          ],
          chartOptions: {
            chart: {
              height: 350,
              type: 'bubble',
            },
            dataLabels: {
              enabled: false,
            },
            fill: {
              opacity: 0.8,
            },
            title: {
              text: 'Companies: Revenue vs Growth',
            },
            subtitle: {
              text: 'Bubble size = headcount',
            },
            xaxis: {
              tickAmount: 10,
              type: 'numeric',
              min: 0,
              max: 500,
              title: {
                text: 'Revenue ($M)',
              },
            },
            yaxis: {
              max: 70,
              title: {
                text: 'YoY Growth (%)',
              },
            },
          },
        },
      })
    </script>
    
  </body>
</html>
