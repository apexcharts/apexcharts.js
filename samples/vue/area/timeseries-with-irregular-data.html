<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>TimeSeries With Irregular Data</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <!-- fake data taken from https://www.metricsgraphicsjs.org/data/fake_users2.json -->
  <script src="../../assets/irregular-data-series.js"></script>
  
  <script>
    var base = new Date('01 Jan 2025 GMT').getTime()
    var ts1 = base
    var ts2 = base + 86400000
    var ts3 = base + 518400000

    var dataSet = [[], [], []]

    for (var i = 0; i < 12; i++) {
      ts1 = ts1 + 86400000
      var innerArr = [ts1, dataSeries[2][i].value]
      dataSet[0].push(innerArr)
    }
    for (var i = 0; i < 18; i++) {
      ts2 = ts2 + 86400000
      var innerArr = [ts2, dataSeries[1][i].value]
      dataSet[1].push(innerArr)
    }
    for (var i = 0; i < 12; i++) {
      ts3 = ts3 + 86400000
      var innerArr = [ts3, dataSeries[0][i].value]
      dataSet[2].push(innerArr)
    }
  </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="area" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;area&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Auth API',
              data: dataSet[0],
            },
            {
              name: 'Search API',
              data: dataSet[1],
            },
            {
              name: 'Media API',
              data: dataSet[2],
            },
          ],
          chartOptions: {
            chart: {
              type: 'area',
              stacked: false,
              height: 350,
              zoom: {
                enabled: false,
              },
            },
            dataLabels: {
              enabled: false,
            },
            markers: {
              size: 0,
            },
            fill: {
              type: 'gradient',
              gradient: {
                shadeIntensity: 1,
                inverseColors: false,
                opacityFrom: 0.45,
                opacityTo: 0.05,
                stops: [20, 100, 100, 100],
              },
            },
            yaxis: {
              labels: {
                style: {
                  colors: '#8e8da4',
                },
                offsetX: 0,
                formatter: function (val) {
                  return (val / 1000000).toFixed(1) + 'M'
                },
              },
              title: {
                text: 'Requests',
              },
              axisBorder: {
                show: false,
              },
              axisTicks: {
                show: false,
              },
            },
            xaxis: {
              type: 'datetime',
              tickAmount: 8,
              min: new Date('01/01/2025').getTime(),
              max: new Date('01/20/2025').getTime(),
              labels: {
                rotate: -15,
                rotateAlways: true,
                format: 'dd MMM yyyy',
              },
            },
            title: {
              text: 'Requests by Service (irregular intervals)',
              align: 'left',
              offsetX: 14,
            },
            tooltip: {
              shared: true,
            },
            legend: {
              position: 'top',
              horizontalAlign: 'right',
              offsetX: -10,
            },
          },
        },
      })
    </script>
    
  </body>
</html>
