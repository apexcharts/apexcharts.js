<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Column - Parsing Data</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Objects with named fields; the chart maps them to x/y via the parsing option.
      const productsList = [
        {
          productId: 1,
          productName: 'Cold Brew',
          unitPrice: 24.5,
          unitsInStock: 320,
        },
        {
          productId: 2,
          productName: 'Espresso Beans',
          unitPrice: 18.0,
          unitsInStock: 210,
        },
        {
          productId: 3,
          productName: 'Matcha Powder',
          unitPrice: 32.0,
          unitsInStock: 140,
        },
        {
          productId: 4,
          productName: 'Chai Blend',
          unitPrice: 15.5,
          unitsInStock: 410,
        },
        {
          productId: 5,
          productName: 'Hazelnut Syrup',
          unitPrice: 12.0,
          unitsInStock: 275,
        },
      ]
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bar" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bar&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Price',
              data: productsList,
              parsing: {
                x: 'productName',
                y: 'unitPrice',
              },
            },
            {
              name: 'Stock',
              data: productsList,
              parsing: {
                x: 'productName',
                y: 'unitsInStock',
              },
            },
          ],
          chartOptions: {
            chart: {
              type: 'bar',
              height: 350,
            },
            title: {
              text: 'Product Price & Stock',
              align: 'left',
            },
            subtitle: {
              text: 'Object arrays mapped to x/y via the parsing option',
              align: 'left',
            },
            plotOptions: {
              bar: {
                horizontal: false,
                borderRadius: 0,
              },
            },
            dataLabels: {
              enabled: false,
            },
            stroke: {
              show: true,
              width: 2,
            },
            fill: {
              opacity: 1,
            },
            yaxis: [
              {
                seriesName: 'Price',
                min: 0,
                title: {
                  text: 'Price',
                },
                labels: {
                  formatter: (val) => {
                    return '$' + val.toFixed(2)
                  },
                },
              },
              {
                opposite: true,
                seriesName: 'Stock',
                min: 0,
                title: {
                  text: 'Stock',
                },
                labels: {
                  formatter: (val) => {
                    return val
                  },
                },
              },
            ],
          },
        },
      })
    </script>
    
  </body>
</html>
