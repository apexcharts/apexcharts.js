<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Column with Group Labels</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // quarter label from a 'YYYY/MM/DD' date string, no external date library
      function quarterOf(val) {
        return Math.floor(new Date(val).getMonth() / 3) + 1
      }
    </script>
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="bar" height="380" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;bar&quot; height=&quot;380&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Revenue',
              data: [
                {
                  x: '2024/01/01',
                  y: 400,
                },
                {
                  x: '2024/04/01',
                  y: 430,
                },
                {
                  x: '2024/07/01',
                  y: 448,
                },
                {
                  x: '2024/10/01',
                  y: 470,
                },
                {
                  x: '2025/01/01',
                  y: 540,
                },
                {
                  x: '2025/04/01',
                  y: 580,
                },
                {
                  x: '2025/07/01',
                  y: 690,
                },
                {
                  x: '2025/10/01',
                  y: 690,
                },
              ],
            },
          ],
          chartOptions: {
            chart: {
              type: 'bar',
              height: 380,
            },
            xaxis: {
              type: 'category',
              labels: {
                formatter: function (val) {
                  return 'Q' + quarterOf(val)
                },
              },
              group: {
                style: {
                  fontSize: '10px',
                  fontWeight: 700,
                },
                groups: [
                  { title: '2024', cols: 4 },
                  { title: '2025', cols: 4 },
                ],
              },
            },
            title: {
              text: 'Quarterly Revenue',
            },
            yaxis: {
              labels: {
                formatter: function (val) {
                  return '$' + val + 'k'
                },
              },
            },
            tooltip: {
              x: {
                formatter: function (val) {
                  return 'Q' + quarterOf(val) + ' ' + new Date(val).getFullYear()
                },
              },
            },
          },
        },
      })
    </script>
    
  </body>
</html>
