<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Range Column Chart</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="rangeBar" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;rangeBar&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: '2024',
              data: [
                {
                  x: 'Jan',
                  y: [-2, 6],
                },
                {
                  x: 'Apr',
                  y: [8, 18],
                },
                {
                  x: 'Jul',
                  y: [18, 29],
                },
                {
                  x: 'Oct',
                  y: [7, 16],
                },
              ],
            },
            {
              name: '2025',
              data: [
                {
                  x: 'Jan',
                  y: [0, 7],
                },
                {
                  x: 'Apr',
                  y: [9, 20],
                },
                {
                  x: 'Jul',
                  y: [19, 31],
                },
                {
                  x: 'Oct',
                  y: [8, 17],
                },
              ],
            },
          ],
          chartOptions: {
            chart: {
              type: 'rangeBar',
              height: 350,
            },
            title: {
              text: 'Monthly Temperature Range',
              align: 'left',
            },
            plotOptions: {
              bar: {
                horizontal: false,
              },
            },
            dataLabels: {
              enabled: true,
            },
            stroke: {
              width: 2,
              colors: ['#fff'],
            },
            yaxis: {
              labels: {
                formatter: function (val) {
                  return val + '°C'
                },
              },
            },
          },
        },
      })
    </script>
    
  </body>
</html>
