<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Multi-series Timeline</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-apexcharts"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"><div id="chart">
      <apexchart type="rangeBar" height="350" :options="chartOptions" :series="series"></apexchart>
    </div></div>

    <!-- Below element is just for displaying source code. it is not required. DO NOT USE -->
    <div id="html">&lt;div id=&quot;chart&quot;&gt;
        &lt;apexchart type=&quot;rangeBar&quot; height=&quot;350&quot; :options=&quot;chartOptions&quot; :series=&quot;series&quot;&gt;&lt;/apexchart&gt;
      &lt;/div&gt;</div>

    <script>
      new Vue({
        el: '#app',
        components: {
          apexchart: VueApexCharts,
        },
        data: {
          series: [
            {
              name: 'Frontend',
              data: [
                {
                  x: 'Design',
                  y: [
                    new Date('2024-03-05').getTime(),
                    new Date('2024-03-08').getTime(),
                  ],
                },
                {
                  x: 'Code',
                  y: [
                    new Date('2024-03-08').getTime(),
                    new Date('2024-03-11').getTime(),
                  ],
                },
                {
                  x: 'Test',
                  y: [
                    new Date('2024-03-11').getTime(),
                    new Date('2024-03-16').getTime(),
                  ],
                },
              ],
            },
            {
              name: 'Backend',
              data: [
                {
                  x: 'Design',
                  y: [
                    new Date('2024-03-02').getTime(),
                    new Date('2024-03-05').getTime(),
                  ],
                },
                {
                  x: 'Code',
                  y: [
                    new Date('2024-03-06').getTime(),
                    new Date('2024-03-09').getTime(),
                  ],
                },
                {
                  x: 'Test',
                  y: [
                    new Date('2024-03-10').getTime(),
                    new Date('2024-03-19').getTime(),
                  ],
                },
              ],
            },
          ],
          chartOptions: {
            chart: {
              height: 350,
              type: 'rangeBar',
            },
            title: {
              text: 'Frontend vs Backend Schedule',
            },
            plotOptions: {
              bar: {
                borderRadius: 10,
                horizontal: true,
              },
            },
            dataLabels: {
              enabled: true,
              formatter: function (val) {
                var diff = Math.round((val[1] - val[0]) / (1000 * 60 * 60 * 24))
                return diff + (diff > 1 ? ' days' : ' day')
              },
            },
            fill: {
              type: 'gradient',
              gradient: {
                shade: 'light',
                type: 'vertical',
                shadeIntensity: 0.25,
                gradientToColors: undefined,
                inverseColors: true,
                opacityFrom: 1,
                opacityTo: 1,
                stops: [50, 0, 100, 100],
              },
            },
            xaxis: {
              type: 'datetime',
            },
            legend: {
              position: 'top',
            },
          },
        },
      })
    </script>
    
  </body>
</html>
