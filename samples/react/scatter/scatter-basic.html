<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Scatter Chart</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-core@5.8.34/browser.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.7.0/dist/react-apexcharts.iife.min.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"></div>

    <div id="html">&lt;div id=&quot;chart&quot;&gt;
  &lt;ReactApexChart options={state.options} series={state.series} type=&quot;scatter&quot; height={350} /&gt;
&lt;/div&gt;</div>

    <script type="text/babel">
      const ApexChart = () => {
        const [state, setState] = React.useState({
          series: [
            {
              name: 'Compact',
              data: [
                [1.0, 52],
                [1.2, 49],
                [1.3, 47],
                [1.4, 50],
                [1.5, 45],
                [1.6, 44],
                [1.6, 48],
                [1.8, 42],
                [1.4, 46],
                [1.2, 51],
                [1.0, 50],
                [1.7, 43],
              ],
            },
            {
              name: 'Sedan',
              data: [
                [2.0, 38],
                [2.2, 35],
                [2.4, 34],
                [2.5, 32],
                [2.6, 33],
                [2.8, 29],
                [3.0, 27],
                [2.3, 36],
                [2.1, 37],
                [2.7, 30],
                [2.9, 28],
                [2.4, 31],
              ],
            },
            {
              name: 'SUV',
              data: [
                [3.2, 26],
                [3.5, 24],
                [3.8, 22],
                [4.0, 21],
                [4.2, 20],
                [4.5, 18],
                [4.8, 17],
                [5.0, 15],
                [3.6, 23],
                [4.1, 19],
                [3.4, 25],
                [4.6, 16],
              ],
            },
          ],
          options: {
            chart: {
              height: 350,
              type: 'scatter',
              zoom: {
                enabled: true,
                type: 'xy',
              },
            },
            title: {
              text: 'Fuel Efficiency vs Engine Size',
            },
            xaxis: {
              tickAmount: 10,
              title: {
                text: 'Engine Size (L)',
              },
              labels: {
                formatter: function (val) {
                  return parseFloat(val).toFixed(1)
                },
              },
            },
            yaxis: {
              tickAmount: 7,
              title: {
                text: 'Fuel Economy (mpg)',
              },
            },
            tooltip: {
              shared: false,
              intersect: true,
            },
          },
        })

        return (
          <div>
            <div id="chart">
              <ReactApexChart
                options={state.options}
                series={state.series}
                type="scatter"
                height={350}
              />
            </div>
            <div id="html-dist"></div>
          </div>
        )
      }

      const domContainer = document.querySelector('#app')
      ReactDOM.render(<ApexChart />, domContainer)
    </script>

    
  </body>
</html>
