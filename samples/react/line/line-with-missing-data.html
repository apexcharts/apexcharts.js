<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Line Chart with missing data</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-core@5.8.34/browser.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.7.0/dist/react-apexcharts.iife.min.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"></div>

    <div id="html">&lt;div id=&quot;chart&quot;&gt;
  &lt;ReactApexChart options={state.options} series={state.series} type=&quot;line&quot; height={350} /&gt;
&lt;/div&gt;</div>

    <script type="text/babel">
      const ApexChart = () => {
        const [state, setState] = React.useState({
          series: [
            {
              name: 'us-east-1',
              data: [
                142,
                138,
                155,
                149,
                151,
                144,
                139,
                null,
                null,
                null,
                158,
                162,
                147,
                150,
                141,
                146,
              ],
            },
            {
              name: 'eu-west-1',
              data: [
                210,
                225,
                null,
                218,
                null,
                208,
                215,
                228,
                null,
                null,
                219,
                null,
                224,
                null,
                null,
                null,
              ],
            },
            {
              name: 'ap-south-1',
              data: [
                null,
                null,
                null,
                null,
                296,
                301,
                288,
                295,
                302,
                310,
                318,
                324,
                305,
                null,
                null,
                null,
              ],
            },
          ],
          options: {
            chart: {
              height: 350,
              type: 'line',
              zoom: {
                enabled: false,
              },
              animations: {
                enabled: false,
              },
            },
            stroke: {
              width: [5, 5, 4],
              curve: 'smooth',
            },
            labels: [
              '2025-06-04T00:00:00',
              '2025-06-04T01:00:00',
              '2025-06-04T02:00:00',
              '2025-06-04T03:00:00',
              '2025-06-04T04:00:00',
              '2025-06-04T05:00:00',
              '2025-06-04T06:00:00',
              '2025-06-04T07:00:00',
              '2025-06-04T08:00:00',
              '2025-06-04T09:00:00',
              '2025-06-04T10:00:00',
              '2025-06-04T11:00:00',
              '2025-06-04T12:00:00',
              '2025-06-04T13:00:00',
              '2025-06-04T14:00:00',
              '2025-06-04T15:00:00',
            ],
            title: {
              text: 'API Response Time by Region',
            },
            subtitle: {
              text: 'Monitoring dropouts (null values) render as gaps',
            },
            xaxis: {
              type: 'datetime',
              labels: {
                format: 'HH:mm',
              },
            },
            yaxis: {
              labels: {
                formatter: function (val) {
                  return val + ' ms'
                },
              },
            },
          },
        })

        return (
          <div>
            <div id="chart">
              <ReactApexChart
                options={state.options}
                series={state.series}
                type="line"
                height={350}
              />
            </div>
            <div id="html-dist"></div>
          </div>
        )
      }

      const domContainer = document.querySelector('#app')
      ReactDOM.render(<ApexChart />, domContainer)
    </script>

    
  </body>
</html>
