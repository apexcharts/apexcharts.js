<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Multiple Y-Axes with seriesName Arrays</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-core@5.8.34/browser.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.7.0/dist/react-apexcharts.iife.min.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Ten days of readings; each y-axis is shared by two series via a
      // seriesName array (temperatures on the left, humidity on the right).
      var start = new Date('01 Jun 2025 GMT').getTime()

      function daily(values) {
        return values.map(function (v, i) {
          return [start + i * 86400000, v]
        })
      }

      var indoorTemp = daily([22, 22.5, 23, 22.8, 23.4, 23.9, 23.1, 22.6, 23.3, 23.7])
      var outdoorTemp = daily([14, 16, 18.5, 17, 19.5, 22, 20, 16.5, 18, 21])
      var indoorHumidity = daily([42, 44, 41, 45, 43, 40, 46, 47, 44, 42])
      var outdoorHumidity = daily([58, 63, 55, 68, 60, 52, 66, 71, 62, 57])
    </script>
  </head>

  <body>
    
    <div id="app"></div>

    <div id="html">&lt;div id=&quot;chart&quot;&gt;
  &lt;ReactApexChart options={state.options} series={state.series} type=&quot;area&quot; height={350} /&gt;
&lt;/div&gt;</div>

    <script type="text/babel">
      const ApexChart = () => {
        const [state, setState] = React.useState({
          series: [
            {
              name: 'Indoor',
              data: indoorTemp,
            },
            {
              name: 'Outdoor',
              data: outdoorTemp,
            },
            {
              name: 'Indoor Humidity',
              data: indoorHumidity,
            },
            {
              name: 'Outdoor Humidity',
              data: outdoorHumidity,
            },
          ],
          options: {
            chart: {
              type: 'area',
              height: 350,
              stacked: false,
            },
            colors: ['#008FFB', '#7BC3FF', '#00E396', '#7FE7C4'],
            dataLabels: {
              enabled: false,
            },
            stroke: {
              curve: 'monotoneCubic',
              width: [4, 4, 2, 2],
              dashArray: [0, 0, 2, 2],
            },
            fill: {
              type: 'gradient',
              gradient: {
                opacityFrom: 0.35,
                opacityTo: 0.05,
              },
            },
            legend: {
              position: 'top',
              horizontalAlign: 'left',
            },
            yaxis: [
              {
                seriesName: ['Indoor', 'Outdoor'],
                axisTicks: {
                  show: true,
                  color: '#008FFB',
                },
                axisBorder: {
                  show: true,
                  color: '#008FFB',
                },
                labels: {
                  style: {
                    colors: '#008FFB',
                  },
                  formatter: (val) => {
                    if (typeof val !== 'undefined') {
                      return val.toFixed(0) + '°C'
                    }
                    return val
                  },
                },
                title: {
                  text: 'Temperature',
                  style: {
                    color: '#008FFB',
                  },
                },
              },
              {
                seriesName: ['Indoor Humidity', 'Outdoor Humidity'],
                opposite: true,
                axisTicks: {
                  show: true,
                  color: '#00E396',
                },
                axisBorder: {
                  show: true,
                  color: '#00E396',
                },
                labels: {
                  style: {
                    colors: '#00E396',
                  },
                  formatter: (val) => {
                    if (typeof val !== 'undefined') {
                      return val.toFixed(0) + '%'
                    }
                    return val
                  },
                },
                title: {
                  text: 'Relative Humidity',
                  style: {
                    color: '#00E396',
                  },
                },
              },
            ],
            xaxis: {
              type: 'datetime',
            },
          },
        })

        return (
          <div>
            <div id="chart">
              <ReactApexChart
                options={state.options}
                series={state.series}
                type="area"
                height={350}
              />
            </div>
            <div id="html-dist"></div>
          </div>
        )
      }

      const domContainer = document.querySelector('#app')
      ReactDOM.render(<ApexChart />, domContainer)
    </script>

    
  </body>
</html>
