<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Column - Parsing Data</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-core@5.8.34/browser.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.7.0/dist/react-apexcharts.iife.min.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // Objects with named fields; the chart maps them to x/y via the parsing option.
      const productsList = [
        {
          productId: 1,
          productName: 'Cold Brew',
          unitPrice: 24.5,
          unitsInStock: 320,
        },
        {
          productId: 2,
          productName: 'Espresso Beans',
          unitPrice: 18.0,
          unitsInStock: 210,
        },
        {
          productId: 3,
          productName: 'Matcha Powder',
          unitPrice: 32.0,
          unitsInStock: 140,
        },
        {
          productId: 4,
          productName: 'Chai Blend',
          unitPrice: 15.5,
          unitsInStock: 410,
        },
        {
          productId: 5,
          productName: 'Hazelnut Syrup',
          unitPrice: 12.0,
          unitsInStock: 275,
        },
      ]
    </script>
  </head>

  <body>
    
    <div id="app"></div>

    <div id="html">&lt;div id=&quot;chart&quot;&gt;
  &lt;ReactApexChart options={state.options} series={state.series} type=&quot;bar&quot; height={350} /&gt;
&lt;/div&gt;</div>

    <script type="text/babel">
      const ApexChart = () => {
        const [state, setState] = React.useState({
          series: [
            {
              name: 'Price',
              data: productsList,
              parsing: {
                x: 'productName',
                y: 'unitPrice',
              },
            },
            {
              name: 'Stock',
              data: productsList,
              parsing: {
                x: 'productName',
                y: 'unitsInStock',
              },
            },
          ],
          options: {
            chart: {
              type: 'bar',
              height: 350,
            },
            title: {
              text: 'Product Price & Stock',
              align: 'left',
            },
            subtitle: {
              text: 'Object arrays mapped to x/y via the parsing option',
              align: 'left',
            },
            plotOptions: {
              bar: {
                horizontal: false,
                borderRadius: 0,
              },
            },
            dataLabels: {
              enabled: false,
            },
            stroke: {
              show: true,
              width: 2,
            },
            fill: {
              opacity: 1,
            },
            yaxis: [
              {
                seriesName: 'Price',
                min: 0,
                title: {
                  text: 'Price',
                },
                labels: {
                  formatter: (val) => {
                    return '$' + val.toFixed(2)
                  },
                },
              },
              {
                opposite: true,
                seriesName: 'Stock',
                min: 0,
                title: {
                  text: 'Stock',
                },
                labels: {
                  formatter: (val) => {
                    return val
                  },
                },
              },
            ],
          },
        })

        return (
          <div>
            <div id="chart">
              <ReactApexChart
                options={state.options}
                series={state.series}
                type="bar"
                height={350}
              />
            </div>
            <div id="html-dist"></div>
          </div>
        )
      }

      const domContainer = document.querySelector('#app')
      ReactDOM.render(<ApexChart />, domContainer)
    </script>

    
  </body>
</html>
