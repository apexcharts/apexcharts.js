<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Column with Group Labels</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      #chart {
        max-width: 650px;
        margin: 35px auto;
      }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-core@5.8.34/browser.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.7.0/dist/react-apexcharts.iife.min.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    <script>
      // quarter label from a 'YYYY/MM/DD' date string, no external date library
      function quarterOf(val) {
        return Math.floor(new Date(val).getMonth() / 3) + 1
      }
    </script>
  </head>

  <body>
    
    <div id="app"></div>

    <div id="html">&lt;div id=&quot;chart&quot;&gt;
  &lt;ReactApexChart options={state.options} series={state.series} type=&quot;bar&quot; height={380} /&gt;
&lt;/div&gt;</div>

    <script type="text/babel">
      const ApexChart = () => {
        const [state, setState] = React.useState({
          series: [
            {
              name: 'Revenue',
              data: [
                {
                  x: '2024/01/01',
                  y: 400,
                },
                {
                  x: '2024/04/01',
                  y: 430,
                },
                {
                  x: '2024/07/01',
                  y: 448,
                },
                {
                  x: '2024/10/01',
                  y: 470,
                },
                {
                  x: '2025/01/01',
                  y: 540,
                },
                {
                  x: '2025/04/01',
                  y: 580,
                },
                {
                  x: '2025/07/01',
                  y: 690,
                },
                {
                  x: '2025/10/01',
                  y: 690,
                },
              ],
            },
          ],
          options: {
            chart: {
              type: 'bar',
              height: 380,
            },
            xaxis: {
              type: 'category',
              labels: {
                formatter: function (val) {
                  return 'Q' + quarterOf(val)
                },
              },
              group: {
                style: {
                  fontSize: '10px',
                  fontWeight: 700,
                },
                groups: [
                  { title: '2024', cols: 4 },
                  { title: '2025', cols: 4 },
                ],
              },
            },
            title: {
              text: 'Quarterly Revenue',
            },
            yaxis: {
              labels: {
                formatter: function (val) {
                  return '$' + val + 'k'
                },
              },
            },
            tooltip: {
              x: {
                formatter: function (val) {
                  return 'Q' + quarterOf(val) + ' ' + new Date(val).getFullYear()
                },
              },
            },
          },
        })

        return (
          <div>
            <div id="chart">
              <ReactApexChart
                options={state.options}
                series={state.series}
                type="bar"
                height={380}
              />
            </div>
            <div id="html-dist"></div>
          </div>
        )
      }

      const domContainer = document.querySelector('#app')
      ReactDOM.render(<ApexChart />, domContainer)
    </script>

    
  </body>
</html>
