<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Live Needle Gauge</title>

    <link href="../../assets/styles.css" rel="stylesheet" />

    <style>
      
        #chart {
      padding: 0;
      max-width: 560px;
      margin: 35px auto;
    }
      
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-core@5.8.34/browser.min.js"></script>
    <script src="../../../dist/apexcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.7.0/dist/react-apexcharts.iife.min.js"></script>
    

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647
        return (_seed - 1) / 2147483646
      }
    </script>

    
  </head>

  <body>
    
    <div id="app"></div>

    <div id="html">&lt;div id=&quot;chart&quot;&gt;
  &lt;ReactApexChart options={state.options} series={state.series} type=&quot;gauge&quot; height={360} /&gt;
&lt;/div&gt;</div>

    <script type="text/babel">
      const ApexChart = () => {
        const [state, setState] = React.useState({
          
            series: [86],
            options: {
              chart: {
                height: 360,
                type: 'gauge',
                animations: {
                  enabled: true,
                  dynamicAnimation: { enabled: true, speed: 800 },
                },
              },
              colors: ['#00A86F'],
              plotOptions: {
                radialBar: {
                  shape: 'needle',
                  startAngle: -90,
                  endAngle: 90,
                  min: 0,
                  max: 100,
                  ticks: {
                    show: true,
                    major: {
                      count: 11,
                      length: 0,
                      width: 0,
                      color: 'transparent',
                      placement: 'outside',
                    },
                    minor: {
                      count: 0,
                      length: 0,
                      width: 0,
                      color: 'transparent',
                    },
                    labels: {
                      show: true,
                      offset: 25,
                      fontSize: '12px',
                      fontWeight: 500,
                      color: '#0F172A',
                      formatter: function (v) {
                        return v + '%'
                      },
                    },
                  },
                  needle: {
                    color: '#1E293B',
                    length: '85%',
                    baseWidth: 10,
                    tipWidth: 1,
                    showValueArc: true,
                  },
                  track: {
                    show: true,
                    background: '#ddd',
                    strokeWidth: '100%',
                    margin: 0,
                  },
                  hollow: {
                    margin: 0,
                    size: '70%',
                    background: 'transparent',
                  },
                  dataLabels: {
                    name: { show: false },
                    value: {
                      offsetY: 20,
                      fontSize: '16px',
                      fontWeight: 700,
                      color: '#0F172A',
                      formatter: function (val) {
                        return val + '%'
                      },
                    },
                  },
                },
              },
              stroke: {
                lineCap: 'butt',
              },
              labels: ['Progress'],
            },
          
          
        });

        
          useEffect(() => {
          const id = window.setInterval(() => {
            setState((s) => ({ ...s, series: [Math.floor(Math.random() * 101)] }))
          }, 2000)
          return () => window.clearInterval(id)
        }, [])
        

        return (
          <div>
            <div id="chart">
                <ReactApexChart options={state.options} series={state.series} type="gauge" height={360} />
              </div>
            <div id="html-dist"></div>
          </div>
        );
      }

      const domContainer = document.querySelector('#app');
      ReactDOM.render(<ApexChart />, domContainer);
    </script>

    
  </body>
</html>
